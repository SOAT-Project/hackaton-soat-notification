name: "Deploy Lambda Notification"

on:
  push:
    branches:
      - develop
      - release
      - main

permissions:
  id-token: write
  contents: read

jobs:
  set_environment:
    runs-on: ubuntu-latest
    outputs:
      mapped_environment: ${{ steps.branch_map.outputs.environment }}

    steps:
      - id: branch_map
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          ENVIRONMENT=""

          case "$BRANCH_NAME" in
            "develop")
              ENVIRONMENT="dev"
              ;;
            "release")
              ENVIRONMENT="hom"
              ;;
            "main")
              ENVIRONMENT="prod"
              ;;
            *)
              echo "Branch $BRANCH_NAME não mapeada para um ambiente de deploy. Abortando."
              exit 1
              ;;
          esac

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "Ambiente mapeado: $ENVIRONMENT"

  deploy_lambda:
    needs: set_environment
    runs-on: ubuntu-latest
    environment: ${{ needs.set_environment.outputs.mapped_environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build (caso use TypeScript)
        run: npm run build || echo "No build step"

      - name: Zip Lambda code
        run: |
          mkdir -p lambda
          zip -r lambda/notification.zip . -x "node_modules/*" -x ".git/*" -x "dist/*" -x "lambda/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Lambda code to S3
        run: |
          ENV=${{ needs.set_environment.outputs.mapped_environment }}
          BUCKET="hackaton-soat-lambda-notification-${ENV}"
          aws s3 cp lambda/notification.zip s3://$BUCKET/notification.zip

      - name: Deploy or Update Lambda
        run: |
          ENV=${{ needs.set_environment.outputs.mapped_environment }}
          LAMBDA_NAME="hackaton-soat-notification-${ENV}"
          BUCKET="hackaton-soat-lambda-notification-${ENV}"
          ROLE_ARN="${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}"

          # Verifica se a função existe
          if aws lambda get-function --function-name "$LAMBDA_NAME" > /dev/null 2>&1; then
            echo "Função existe. Atualizando código..."
            aws lambda update-function-code \
              --function-name "$LAMBDA_NAME" \
              --s3-bucket "$BUCKET" \
              --s3-key "notification.zip"
          else
            echo "Função não encontrada. Criando nova..."
            aws lambda create-function \
              --function-name "$LAMBDA_NAME" \
              --runtime nodejs18.x \
              --role "$ROLE_ARN" \
              --handler "index.handler" \
              --code S3Bucket="$BUCKET",S3Key="notification.zip" \
              --environment "Variables={ENVIRONMENT=$ENV,AWS_REGION=${{ secrets.AWS_REGION }}}"
          fi

      - name: Update Lambda environment variables
        run: |
          ENV=${{ needs.set_environment.outputs.mapped_environment }}
          LAMBDA_NAME="hackaton-soat-notification-${ENV}"
          aws lambda update-function-configuration \
            --function-name "$LAMBDA_NAME" \
            --environment "Variables={ENVIRONMENT=$ENV,AWS_REGION=${{ secrets.AWS_REGION }}}"

      - name: Create SQS trigger for Lambda
        run: |
          ENV=${{ needs.set_environment.outputs.mapped_environment }}
          LAMBDA_NAME="hackaton-soat-notification-${ENV}"
          SQS_QUEUE_NAME="hackaton-soat-terraform-hackaton-soat-notify"
          SQS_ARN=$(aws sqs get-queue-attributes \
            --queue-url $(aws sqs get-queue-url --queue-name $SQS_QUEUE_NAME --output text) \
            --attribute-name QueueArn --query 'Attributes.QueueArn' --output text)
          aws lambda create-event-source-mapping \
            --function-name "$LAMBDA_NAME" \
            --event-source-arn "$SQS_ARN" \
            --batch-size 10 \
            --enabled
        continue-on-error: true
